<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codebeamer Test Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Codebeamer Test Manager</h1>
    <div class="actions">
      <button id="btnCreateTestcase">+ Create Testcase</button>
      <button id="btnEditSteps">Edit Test Steps</button>
      <button id="btnRefresh">Refresh Children</button>
    </div>
  </header>

  <main class="layout">
    <!-- Left: tree -->
    <section class="panel tree-panel">
      <div class="panel-header">Projects</div>
      <ul id="tree" class="tree"></ul>
    </section>

    <!-- Right: details -->
    <section class="panel detail-panel">
      <div class="panel-header">Details</div>
      <div id="detail" class="detail">
        <p class="muted">Select a node from the tree to see details.</p>
      </div>
    </section>
  </main>

  <!-- Simple modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Modal</h3>
        <button class="close-btn" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button id="modalCancel">Cancel</button>
        <button id="modalSubmit" class="primary">Submit</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
