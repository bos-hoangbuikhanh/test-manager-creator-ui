<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codebeamer Test Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">🧪 Codebeamer Test Manager</div>
    <div class="topbar-creds">
      <input id="inputUser" class="cred-input" type="text" placeholder="CB Username" autocomplete="username" />
      <input id="inputPass" class="cred-input" type="password" placeholder="CB Password" autocomplete="current-password" />
    </div>
  </header>

  <main class="layout">
    <!-- Left: tree -->
    <aside class="sidebar">
      <div class="panel-header">
        Projects
        <button id="btnRefreshTree" class="icon-btn" title="Reload projects">↻</button>
      </div>
      <ul id="tree" class="tree"></ul>
    </aside>

    <!-- Right: workspace -->
    <section class="workspace" id="workspace">
      <div class="workspace-empty">
        <p>Select a node in the tree to see details,<br />or click <strong>Create Testcase</strong> on a parent node.</p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
